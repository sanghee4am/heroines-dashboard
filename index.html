<!DOCTYPE html>
<html lang='ko'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width,initial-scale=1.0'>
<title>Heroines Dashboard</title>
<style>

*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f172a;--bg2:#1e293b;--bg3:#0f1c2e;
  --border:#1e3a5f;--border2:#2d3748;
  --text:#e2e8f0;--text2:#94a3b8;--text3:#475569;
  --accent:#7c3aed;--accent2:#a78bfa;
  --bound:#10b981;--quality:#a78bfa;--onboard:#3b82f6;
  --contact:#64748b;--offer:#f59e0b;--dropped:#475569;
  --red:#ef4444;--orange:#f59e0b;--green:#10b981;--pink:#f093fb;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif;
     background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* ── Header ── */
.app-header{background:var(--bg2);border-bottom:1px solid var(--border);
  padding:0 24px;display:flex;align-items:center;height:52px;
  position:sticky;top:0;z-index:50}
.logo{font-size:18px;font-weight:800;
  background:linear-gradient(90deg,#f093fb,#a78bfa);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  margin-right:32px;letter-spacing:-.5px}
.nav-tab{padding:0 16px;height:52px;display:flex;align-items:center;
  font-size:13px;font-weight:500;color:var(--text3);cursor:pointer;
  border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}
.nav-tab:hover{color:var(--text2)}
.nav-tab.active{color:var(--accent2);border-bottom-color:var(--accent2)}
.header-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.date-badge{font-size:12px;color:var(--text3);background:var(--bg3);
  padding:4px 10px;border-radius:6px;border:1px solid var(--border)}
.refresh-btn{display:flex;align-items:center;gap:5px;padding:5px 12px;
  border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;
  background:var(--bg3);border:1px solid var(--border);color:var(--text2);
  transition:all .15s;white-space:nowrap}
.refresh-btn:hover{background:var(--accent);border-color:var(--accent);color:#fff}
.refresh-btn.loading{opacity:.6;pointer-events:none}
.refresh-btn svg{transition:transform .4s}
.refresh-btn.loading svg{animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.update-time{font-size:11px;color:var(--text3)}

/* ── Layout ── */
.main{padding:20px 24px;max-width:1400px}
.tab-page{display:none}.tab-page.active{display:block}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
@media(max-width:900px){.two-col{grid-template-columns:1fr}}
.panel{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:18px}
.panel-title{font-size:12px;font-weight:700;color:var(--text3);
  text-transform:uppercase;letter-spacing:.6px;margin-bottom:14px}

/* ── KPI ── */
.kpi-row{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.kpi-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;
  padding:14px 16px;flex:1;min-width:130px}
.kpi-label{font-size:11px;color:var(--text3);text-transform:uppercase;
  letter-spacing:.6px;margin-bottom:6px}
.kpi-val{font-size:24px;font-weight:700;color:var(--text);line-height:1}
.kpi-delta{font-size:11px;margin-top:4px}
.delta-up{color:var(--green)}.delta-dn{color:var(--red)}.delta-neu{color:var(--text3)}
.kpi-card.accent-bound{border-top:2px solid var(--bound)}
.kpi-card.accent-purple{border-top:2px solid var(--accent2)}
.kpi-card.accent-orange{border-top:2px solid var(--orange)}
.kpi-card.accent-red{border-top:2px solid var(--red)}
.kpi-card.accent-blue{border-top:2px solid var(--onboard)}

/* ── Stage bar ── */
.stage-bar-item{display:flex;align-items:center;gap:10px;margin-bottom:8px;font-size:13px}
.stage-bar-label{width:130px;color:var(--text2);flex-shrink:0}
.stage-bar-track{flex:1;background:var(--bg3);border-radius:20px;height:8px;overflow:hidden}
.stage-bar-fill{height:100%;border-radius:20px;transition:width .4s}
.stage-bar-count{width:30px;text-align:right;color:var(--text);font-weight:600;font-size:12px}

/* ── Bar chart ── */
.bar-chart{display:flex;gap:6px;align-items:flex-end;padding-top:8px}
.bar-wrap{display:flex;flex-direction:column;align-items:center;flex:1;gap:4px}
.bar-col{width:100%;border-radius:4px 4px 0 0;min-height:2px;background:var(--accent)}
.bar-lbl{font-size:9px;color:var(--text3);text-align:center;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:100%}
.bar-val{font-size:10px;color:var(--text2)}

/* ── Slot types ── */
.slot-type-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.slot-type-item{background:var(--bg3);border:1px solid var(--border);
  border-radius:8px;padding:10px 12px}
.st-name{font-size:11px;color:var(--text2);margin-bottom:4px}
.st-val{font-size:20px;font-weight:700}

/* ── Bottom stat ── */
.stat-row{background:var(--bg2);border:1px solid var(--border);border-radius:10px;
  padding:14px 20px;display:flex;gap:32px;flex-wrap:wrap;margin-bottom:20px}
.stat-item{text-align:center}
.stat-item .s-val{font-size:18px;font-weight:700;color:var(--text)}
.stat-item .s-lbl{font-size:11px;color:var(--text3);margin-top:2px}

/* ── Influencer table ── */
.filter-bar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.filter-btn{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;
  cursor:pointer;border:1px solid var(--border2);background:var(--bg2);
  color:var(--text2);transition:all .15s}
.filter-btn:hover,.filter-btn.active{background:var(--accent);
  border-color:var(--accent);color:#fff}
.filter-select{padding:6px 10px;border-radius:20px;font-size:12px;
  border:1px solid var(--border2);background:var(--bg2);color:var(--text2);
  cursor:pointer;outline:none}
.search-input{padding:6px 12px;border-radius:20px;font-size:12px;
  border:1px solid var(--border2);background:var(--bg2);color:var(--text);
  outline:none;width:180px}
.search-input::placeholder{color:var(--text3)}
.search-input:focus{border-color:var(--accent)}
.inf-table{width:100%;border-collapse:collapse}
.inf-table th{text-align:left;padding:9px 12px;font-size:11px;color:var(--text3);
  text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);
  background:var(--bg3);white-space:nowrap}
.inf-table td{padding:10px 12px;font-size:13px;
  border-bottom:1px solid var(--bg3);vertical-align:middle;white-space:nowrap}
.inf-table tr{cursor:pointer;transition:background .1s}
.inf-table tr:hover td{background:var(--bg2)}
.inf-table tr.row-overdue td{background:rgba(239,68,68,.06)}
.inf-table tr.row-overdue:hover td{background:rgba(239,68,68,.1)}

/* ── Stage badges ── */
.s-badge{display:inline-flex;align-items:center;padding:3px 9px;
  border-radius:10px;font-size:11px;font-weight:700;white-space:nowrap}
.sb-Bound{background:rgba(16,185,129,.15);color:#34d399}
.sb-BindingOffered{background:rgba(245,158,11,.15);color:#fbbf24}
.sb-Quality{background:rgba(167,139,250,.15);color:#a78bfa}
.sb-Onboarding{background:rgba(59,130,246,.15);color:#60a5fa}
.sb-Contacting{background:rgba(100,116,139,.15);color:#94a3b8}
.sb-Test{background:rgba(14,165,233,.15);color:#38bdf8}
.sb-USP{background:rgba(16,185,129,.12);color:#6ee7b7}
.sb-Muga{background:rgba(52,211,153,.12);color:#6ee7b7}
.sb-Dropped{background:rgba(71,85,105,.15);color:#64748b}
.slot-bar-mini{width:60px;height:5px;background:var(--bg3);border-radius:10px;
  overflow:hidden;display:inline-block;vertical-align:middle;margin-left:6px}
.slot-bar-mini-fill{height:100%;background:var(--accent2);border-radius:10px}

/* ── Side panel ── */
#panel-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.55);
  z-index:100;display:none;opacity:0;transition:opacity .2s}
#panel-backdrop.open{display:block;opacity:1}
#side-panel{position:fixed;top:0;right:0;width:400px;max-width:95vw;height:100vh;
  background:var(--bg);border-left:1px solid var(--border);z-index:101;
  transform:translateX(100%);transition:transform .25s;overflow-y:auto;
  display:flex;flex-direction:column}
#side-panel.open{transform:translateX(0)}
.sp-header{padding:18px 20px;border-bottom:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:flex-start;
  position:sticky;top:0;background:var(--bg);z-index:1}
.sp-name{font-size:18px;font-weight:800;color:var(--text)}
.sp-id{font-size:12px;color:var(--text3);margin-top:2px}
.sp-close{background:none;border:none;color:var(--text2);font-size:20px;
  cursor:pointer;padding:4px 8px;border-radius:6px;line-height:1}
.sp-close:hover{background:var(--bg2)}
.sp-body{padding:20px;flex:1}
.sp-section{margin-bottom:18px}
.sp-sec-title{font-size:11px;font-weight:700;color:var(--text3);
  text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px;
  padding-bottom:6px;border-bottom:1px solid var(--border)}
.sp-row{display:flex;justify-content:space-between;align-items:center;
  padding:5px 0;font-size:13px}
.sp-row-lbl{color:var(--text3)}
.sp-row-val{color:var(--text);font-weight:500;text-align:right;
  max-width:60%;word-break:break-all}
.bc-week-badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.bc-week{display:flex;flex-direction:column;align-items:center;gap:3px}
.bc-week-lbl{font-size:10px;color:var(--text3)}
.bc-week-val{padding:3px 8px;border-radius:8px;font-size:11px;font-weight:700}
.bc-pass{background:rgba(16,185,129,.2);color:#34d399}
.bc-warn{background:rgba(245,158,11,.2);color:#fbbf24}
.bc-drop{background:rgba(239,68,68,.2);color:#f87171}
.bc-none{background:var(--bg2);color:var(--text3)}
.sp-action-btns{display:flex;gap:8px;margin-top:4px}
.sp-btn{flex:1;padding:9px;border-radius:8px;font-size:12px;font-weight:600;
  border:1px solid var(--border2);background:var(--bg2);color:var(--text2);
  cursor:pointer;transition:all .15s}
.sp-btn:hover{background:var(--accent);border-color:var(--accent);color:#fff}
.mini-t{width:100%;border-collapse:collapse}
.mini-t th{text-align:left;padding:6px 8px;font-size:11px;color:var(--text3);
  border-bottom:1px solid var(--border);background:var(--bg2)}
.mini-t td{padding:6px 8px;font-size:12px;border-bottom:1px solid var(--bg3)}
.mini-t tr:hover td{background:var(--bg2)}

/* ── Campaign cards ── */
.camp-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
.camp-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;
  padding:18px;cursor:pointer;transition:all .15s;position:relative;overflow:hidden}
.camp-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.camp-card.type-paid::before{background:linear-gradient(90deg,#7c3aed,#f093fb)}
.camp-card.type-mock::before{background:linear-gradient(90deg,#374151,#6b7280)}
.camp-card:hover{border-color:var(--accent);transform:translateY(-2px);
  box-shadow:0 8px 24px rgba(0,0,0,.3)}
.camp-card-name{font-size:16px;font-weight:800;color:var(--text);margin-bottom:6px}
.camp-type-badge{display:inline-block;padding:2px 8px;border-radius:8px;
  font-size:11px;font-weight:700;margin-bottom:12px}
.ctb-paid{background:rgba(124,58,237,.2);color:#a78bfa}
.ctb-mock{background:rgba(55,65,81,.3);color:#6b7280}
.camp-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.cs-item .cs-val{font-size:16px;font-weight:700;color:var(--text)}
.cs-item .cs-lbl{font-size:11px;color:var(--text3)}
.camp-period{font-size:11px;color:var(--text3);margin-top:12px;
  padding-top:10px;border-top:1px solid var(--border)}

/* ── Campaign Modal ── */
#modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.7);
  z-index:200;display:none;opacity:0;transition:opacity .2s;
  align-items:center;justify-content:center}
#modal-backdrop.open{display:flex;opacity:1}
#camp-modal{background:var(--bg);border:1px solid var(--border);border-radius:16px;
  width:820px;max-width:95vw;max-height:90vh;overflow-y:auto;z-index:201;
  box-shadow:0 24px 80px rgba(0,0,0,.5)}
.modal-header{padding:20px 24px;border-bottom:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:center;
  position:sticky;top:0;background:var(--bg);z-index:1}
.modal-title{font-size:18px;font-weight:800}
.modal-close{background:none;border:none;color:var(--text2);font-size:22px;
  cursor:pointer;padding:4px 8px;border-radius:6px}
.modal-close:hover{background:var(--bg2)}
.modal-body{padding:24px}
.modal-section{margin-bottom:28px}
.modal-sec-title{font-size:12px;font-weight:700;color:var(--text3);
  text-transform:uppercase;letter-spacing:.6px;margin-bottom:14px}
.summary-nums{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:10px}
.sn-item{background:var(--bg2);border:1px solid var(--border);
  border-radius:8px;padding:12px;text-align:center}
.sn-val{font-size:18px;font-weight:700;color:var(--text)}
.sn-lbl{font-size:11px;color:var(--text3);margin-top:2px}

/* ── Campaign Timeline (Gantt) ── */
.timeline-wrap{overflow-x:auto;padding-bottom:4px}
.timeline-grid{min-width:560px}
.tl-header{display:flex;margin-bottom:2px;padding-left:0}
.tl-stage-col{display:flex;align-items:center;gap:0}
.tl-header-cell{font-size:10px;color:var(--text3);text-align:center;font-weight:600}
.tl-row{display:flex;align-items:center;margin-bottom:6px;height:28px}
.tl-label{font-size:12px;color:var(--text2);white-space:nowrap;
  padding-right:12px;flex-shrink:0;width:140px}
.tl-track{flex:1;position:relative;height:28px;display:flex}
.tl-segment{height:22px;margin-top:3px;border-radius:4px;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:600;white-space:nowrap;overflow:hidden;
  text-overflow:ellipsis;padding:0 4px;transition:opacity .15s;cursor:default}
.tl-segment:hover{opacity:.85;filter:brightness(1.1)}
.tl-today-line{position:absolute;top:0;bottom:0;width:2px;
  background:var(--red);opacity:.7;z-index:2}
.tl-today-label{position:absolute;top:-16px;font-size:9px;
  color:var(--red);transform:translateX(-50%);white-space:nowrap}
.tl-legend{display:flex;gap:12px;flex-wrap:wrap;margin-top:12px}
.tl-legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2)}
.tl-legend-dot{width:10px;height:10px;border-radius:3px}

/* ── Weekly ── */
.week-tabs{display:flex;margin-bottom:20px;background:var(--bg2);
  border:1px solid var(--border);border-radius:10px;overflow:hidden;width:fit-content}
.week-tab{padding:8px 18px;font-size:12px;font-weight:600;color:var(--text3);
  cursor:pointer;border-right:1px solid var(--border);transition:all .15s}
.week-tab:last-child{border-right:none}
.week-tab.active{background:var(--accent);color:#fff}
.week-tab:hover:not(.active){background:var(--bg3);color:var(--text2)}
.snapshot-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px}
.snap-item{background:var(--bg3);border:1px solid var(--border);
  border-radius:8px;padding:10px;text-align:center}
.snap-stage{font-size:11px;color:var(--text3);margin-bottom:4px}
.snap-val{font-size:20px;font-weight:700;color:var(--text)}
.snap-delta{font-size:11px;margin-top:2px}
.weekly-t{width:100%;border-collapse:collapse}
.weekly-t th{text-align:left;padding:9px 12px;font-size:11px;color:var(--text3);
  border-bottom:1px solid var(--border);background:var(--bg3);white-space:nowrap}
.weekly-t td{padding:9px 12px;font-size:12px;border-bottom:1px solid var(--bg3)}
.weekly-t tr.current-week td{background:rgba(124,58,237,.08);font-weight:600}

/* ── Toast ── */
#toast{position:fixed;bottom:24px;left:50%;
  transform:translateX(-50%) translateY(20px);
  background:var(--bg2);border:1px solid var(--border);color:var(--text);
  padding:10px 20px;border-radius:10px;font-size:13px;opacity:0;
  transition:all .3s;pointer-events:none;z-index:300}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

</style>
</head>

<script>document.getElementById('today-badge').textContent=new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'short'});</script>

<script>

// ── Data Processing ──────────────────────────────────────────────────────
const CREATORS = RAW_CREATORS.map((c,i) => {
  const usedSlot = USED_BY_ID[c.tiktokId] !== undefined ? USED_BY_ID[c.tiktokId] : c.usedSlot;
  const leftSlot = c.slotNum - usedSlot;
  const bc = BC_SCORE_RAW[c.tiktokId] || null;
  const campaignHistory = CAMPAIGN_LOG.filter(cl => cl.tiktokId === c.tiktokId);
  const brandHistory    = BRAND_CONTACTS.filter(b => b.heroine === c.tiktokId || b.heroine === c.name);
  return Object.assign({}, c, {id:i, usedSlot, leftSlot, bcScore:bc, campaignHistory, brandHistory});
});

function addDays(dateStr, n) {
  const d = new Date(dateStr); d.setDate(d.getDate()+n); return d.toISOString().slice(0,10);
}
function daysBetween(a, b) {
  return Math.round((new Date(b)-new Date(a))/86400000);
}
function daysSince(d) {
  if (!d) return null;
  const dt = new Date(d); if (isNaN(dt)) return null;
  return Math.floor((Date.now()-dt)/86400000);
}
function isOverdue(c) {
  const lead = STAGE_LEAD[c.stage];
  if (lead===null||lead===undefined||c.stage==='Dropped') return false;
  const d = daysSince(c.stageStart);
  return d!==null && d>lead;
}
function stageClass(stage) {
  const m={'Bound':'sb-Bound','Binding Offered':'sb-BindingOffered','Quality':'sb-Quality',
    'Onboarding':'sb-Onboarding','Contacting':'sb-Contacting','Test':'sb-Test',
    'USP':'sb-USP','Muga':'sb-Muga','Dropped':'sb-Dropped'};
  return m[stage]||'sb-Contacting';
}
function fmtFee(n){return n?(n>=10000?(n/10000).toFixed(0)+'만원':n.toLocaleString()+'원'):'-'}
function fmtDate(s){return s?String(s).slice(0,10):'-'}
function escH(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function row(lbl,val){return '<div class="sp-row"><span class="sp-row-lbl">'+lbl+'</span><span class="sp-row-val">'+val+'</span></div>'}

// ── Campaign meta ──────────────────────────────────────────────────────────
const CAMP_META = {};
CAMPAIGN_LOG.forEach(cl => {
  if (!cl.campaign) return;
  const n = cl.campaign;
  if (!CAMP_META[n]) CAMP_META[n] = {name:n,creatorSet:new Set(),slots:0,fee:0,dates:[],entries:[]};
  CAMP_META[n].creatorSet.add(cl.tiktokId);
  CAMP_META[n].slots += cl.slot||0;
  CAMP_META[n].fee   += cl.fee||0;
  if (cl.date) CAMP_META[n].dates.push(cl.date);
  CAMP_META[n].entries.push(cl);
});
const CAMPAIGNS = Object.values(CAMP_META).map(c=>({
  ...c, creators:c.creatorSet.size,
  startDate: c.dates.length ? c.dates.sort()[0] : null,
  endDate:   c.dates.length ? c.dates.sort().slice(-1)[0] : null
}));
CAMPAIGNS.push({
  name:'Project Aurora',creators:15,slots:15,fee:1800000,
  startDate:'2026-04-07',endDate:'2026-04-28',entries:[],isMock:true
});

// Timeline stage colours
const TL_COLORS = [
  {bg:'rgba(59,130,246,.35)',  text:'#93c5fd'},  // 인플 디스커버리
  {bg:'rgba(245,158,11,.35)',  text:'#fde68a'},  // 배송
  {bg:'rgba(16,185,129,.35)',  text:'#6ee7b7'},  // 가이드라인 콜
  {bg:'rgba(167,139,250,.35)', text:'#ddd6fe'},  // 1차 제출
  {bg:'rgba(239,68,68,.30)',   text:'#fca5a5'},  // 피드백
  {bg:'rgba(236,72,153,.30)',  text:'#f9a8d4'},  // 2차 제출
  {bg:'rgba(14,165,233,.30)',  text:'#bae6fd'},  // 최종 확인
  {bg:'rgba(52,211,153,.35)',  text:'#a7f3d0'},  // 업로드
];

// Build timeline stages from a campaign startDate
function buildTimelineStages(startDate) {
  let cur = startDate;
  return CAMPAIGN_STAGES.map((s,i) => {
    const from = cur;
    const to   = s.days > 0 ? addDays(cur, s.days) : cur;
    cur = to;
    return {...s, from, to, color:TL_COLORS[i]};
  });
}

// ── TAB 1: Dashboard ──────────────────────────────────────────────────────
function buildDashboard() {
  const bound       = CREATORS.filter(c=>c.stage==='Bound');
  const totalSlots  = bound.reduce((s,c)=>s+c.slotNum,0);
  const usedSlots   = bound.reduce((s,c)=>s+c.usedSlot,0);
  const leftSlots   = totalSlots-usedSlots;
  const projSlots   = Math.round(totalSlots*1.15);
  const overdue     = CREATORS.filter(c=>isOverdue(c)&&c.stage!=='Dropped').length;

  document.getElementById('kpi-row').innerHTML = [
    {label:'Bound 슬롯',val:totalSlots,delta:'+2',up:true, cls:'accent-bound'},
    {label:'이번달 사용',val:usedSlots, delta:'+3',up:true, cls:'accent-blue'},
    {label:'남은 슬롯',  val:leftSlots, delta:'-1',up:false,cls:'accent-purple'},
    {label:'Projected',  val:projSlots, delta:'+5',up:true, cls:'accent-purple'},
    {label:'오버듀 액션',val:overdue,   delta:'-2',up:false,cls:'accent-red'},
  ].map(k=>'<div class="kpi-card '+k.cls+'">' +
    '<div class="kpi-label">'+k.label+'</div>' +
    '<div class="kpi-val">'+k.val+'</div>' +
    '<div class="kpi-delta '+(k.up?'delta-up':'delta-dn')+'">'+(k.up?'↑':'↓')+' '+k.delta+' vs 전주</div></div>'
  ).join('');

  // Stage bars
  const stages = ['Contacting','Onboarding','Test','USP','Muga','Quality','Binding Offered','Bound','Dropped'];
  const stageColors = {'Contacting':'var(--contact)','Onboarding':'var(--onboard)','Test':'#0ea5e9',
    'USP':'#6ee7b7','Muga':'var(--bound)','Quality':'var(--quality)',
    'Binding Offered':'var(--offer)','Bound':'var(--bound)','Dropped':'var(--dropped)'};
  const counts = {};
  CREATORS.forEach(c=>{counts[c.stage]=(counts[c.stage]||0)+1});
  const maxC = Math.max(...Object.values(counts));
  document.getElementById('stage-bars').innerHTML = stages.filter(s=>counts[s]).map(s=>
    '<div class="stage-bar-item"><div class="stage-bar-label">'+s+'</div>' +
    '<div class="stage-bar-track"><div class="stage-bar-fill" style="width:'+Math.round(counts[s]/maxC*100)+'%;background:'+stageColors[s]+'"></div></div>' +
    '<div class="stage-bar-count">'+counts[s]+'</div></div>'
  ).join('');

  // Expected week bars
  const wc={};
  CREATORS.forEach(c=>{const w=c.expectedWeek;if(w)wc[String(w).slice(0,10)]=(wc[String(w).slice(0,10)]||0)+1});
  const wks=Object.keys(wc).sort(), maxW=Math.max(...Object.values(wc),1);
  document.getElementById('week-bars').innerHTML =
    '<div class="bar-chart" style="height:120px">'+
    wks.map(w=>'<div class="bar-wrap">' +
      '<div class="bar-val">'+wc[w]+'</div>' +
      '<div class="bar-col" style="height:'+Math.round(wc[w]/maxW*80)+'px"></div>' +
      '<div class="bar-lbl">'+w.slice(5)+'</div></div>'
    ).join('')+'</div>';

  // Slot types
  const ba_only = CREATORS.filter(c=>c.stage==='Bound'&&c.slotBA&&!c.slotMakeup).length;
  const mk_only = CREATORS.filter(c=>c.stage==='Bound'&&c.slotMakeup&&!c.slotBA).length;
  const both    = CREATORS.filter(c=>c.stage==='Bound'&&c.slotBA&&c.slotMakeup).length;
  const usp     = CREATORS.filter(c=>['Quality','Binding Offered','Bound'].includes(c.stage)).length;
  document.getElementById('slot-types').innerHTML = [
    {name:'B&A',val:ba_only,color:'#a78bfa'},
    {name:'Makeup',val:mk_only,color:'#f093fb'},
    {name:'B&A+Makeup',val:both,color:'#34d399'},
    {name:'USP 진행',val:usp,color:'#38bdf8'},
  ].map(s=>'<div class="slot-type-item"><div class="st-name">'+s.name+'</div><div class="st-val" style="color:'+s.color+'">'+s.val+'</div></div>').join('');

  // Bottom stats
  const thisMonth = new Date().toISOString().slice(0,7);
  const qaTotal  = CREATORS.filter(c=>['Quality','Binding Offered','Bound'].includes(c.stage)).length;
  const qaPassed = CREATORS.filter(c=>c.bcScore&&c.bcScore.latestResult==='통과').length;
  const monthRev = CAMPAIGN_LOG.filter(cl=>cl.date&&cl.date.slice(0,7)===thisMonth).reduce((s,cl)=>s+(cl.fee||0),0);
  document.getElementById('bottom-stats').innerHTML = [
    {lbl:'신규 Contact', val:CREATORS.filter(c=>c.stage==='Contacting'&&c.stageStart&&c.stageStart.slice(0,7)===thisMonth).length},
    {lbl:'신규 Bound',   val:CREATORS.filter(c=>c.stage==='Bound'&&c.stageStart&&c.stageStart.slice(0,7)===thisMonth).length},
    {lbl:'QA 제출',     val:qaTotal},
    {lbl:'QA 통과율',   val:(qaTotal?Math.round(qaPassed/qaTotal*100):0)+'%'},
    {lbl:'이번달 수익', val:fmtFee(monthRev)},
  ].map(s=>'<div class="stat-item"><div class="s-val">'+s.val+'</div><div class="s-lbl">'+s.lbl+'</div></div>').join('');
}

// ── TAB 2: Influencer ────────────────────────────────────────────────────
let infFilter='all', infStageFilter='', infSearch='';
function buildInfluencer() {
  const stageOrd=['Bound','Binding Offered','Quality','Muga','USP','Test','Onboarding','Contacting','Dropped'];
  let data = CREATORS.filter(c=>infFilter==='all'||c.stage!=='Dropped');
  if (infFilter==='stuck') data = data.filter(c=>isOverdue(c));
  if (infFilter==='this-week') data = data.filter(c=>c.nextAction&&(isOverdue(c)||daysSince(c.stageStart)!==null));
  if (infStageFilter) data = data.filter(c=>c.stage===infStageFilter);
  if (infSearch){const q=infSearch.toLowerCase();data=data.filter(c=>(c.name||'').toLowerCase().includes(q)||(c.tiktokId||'').toLowerCase().includes(q))}
  data.sort((a,b)=>{
    const ao=isOverdue(a)?0:1,bo=isOverdue(b)?0:1;
    if(ao!==bo)return ao-bo;
    return stageOrd.indexOf(a.stage)-stageOrd.indexOf(b.stage);
  });
  document.getElementById('inf-tbody').innerHTML = data.map(c=>{
    const od=isOverdue(c), days=daysSince(c.stageStart), lead=STAGE_LEAD[c.stage];
    const pct=c.slotNum?Math.min(100,Math.round(c.usedSlot/c.slotNum*100)):0;
    return '<tr class="'+(od?'row-overdue':'')+'" onclick="openPanel('+c.id+')">' +
      '<td><span style="font-weight:600">'+escH(c.name||c.tiktokId||'?')+'</span></td>' +
      '<td><span style="color:var(--text3);font-size:12px">@'+escH(c.tiktokId||'')+'</span></td>' +
      '<td><span class="s-badge '+stageClass(c.stage)+'">'+escH(c.stage)+'</span></td>' +
      '<td><span style="font-weight:600">'+c.usedSlot+'/'+c.slotNum+'</span>' +
        '<span class="slot-bar-mini"><span class="slot-bar-mini-fill" style="width:'+pct+'%"></span></span></td>' +
      '<td><span style="color:'+(od?'var(--red)':'var(--text2)')+'">'+
        (days!==null?days+'일':'−')+(lead!==undefined&&lead!==null?'/'+lead+'일':'')+'</span></td>' +
      '<td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;font-size:12px;color:var(--text2)">'+escH(c.nextAction||'−')+'</td>' +
      '<td><span style="font-size:11px;color:var(--text3)">−</span></td></tr>';
  }).join('');
}
function setInfFilter(f){infFilter=f;document.querySelectorAll('.filter-btn[data-f]').forEach(b=>b.classList.toggle('active',b.dataset.f===f));buildInfluencer()}
function setInfStage(s){infStageFilter=s;buildInfluencer()}
function setInfSearch(q){infSearch=q;buildInfluencer()}

// ── Side Panel ───────────────────────────────────────────────────────────
function openPanel(id) {
  const c = CREATORS.find(x=>x.id===id); if(!c)return;
  document.getElementById('sp-name').textContent = c.name||c.tiktokId||'?';
  document.getElementById('sp-tid').textContent  = '@'+(c.tiktokId||'');
  const od=isOverdue(c), days=daysSince(c.stageStart), lead=STAGE_LEAD[c.stage];
  let html='';

  html+='<div class="sp-section"><div class="sp-sec-title">프로필</div>';
  html+=row('Stage','<span class="s-badge '+stageClass(c.stage)+'">'+escH(c.stage)+'</span>'+(od?' <span style="color:var(--red);font-size:11px">⚠ 연체</span>':''));
  html+=row('체류일',days!==null?days+'일'+(lead!==undefined&&lead!==null?' / 한도 '+lead+'일':''):'−');
  html+=row('Next Action',escH(c.nextAction||'−'));
  html+=row('Expected Bind',escH(c.expectedBind||'−'));
  html+=row('Expected Week',escH(c.expectedWeek||'−'));
  html+='</div>';

  html+='<div class="sp-section"><div class="sp-sec-title">슬롯 현황</div>';
  html+=row('총 슬롯',c.slotNum+'개');
  html+=row('사용 슬롯',c.usedSlot+'개');
  html+=row('잔여 슬롯','<span style="color:var(--bound);font-weight:700">'+c.leftSlot+'개</span>');
  html+=row('B&A',c.slotBA?'✓':'✗');
  html+=row('Makeup',c.slotMakeup?'✓':'✗');
  html+='</div>';

  if(c.bcScore){
    const bc=c.bcScore;
    html+='<div class="sp-section"><div class="sp-sec-title">BC Score · '+escH(bc.batch)+'</div>';
    html+='<div class="bc-week-badges">';
    (bc.allResults||[]).forEach((r,i)=>{
      const cls=r==='통과'?'bc-pass':r==='경고'?'bc-warn':r==='드랍'?'bc-drop':'bc-none';
      html+='<div class="bc-week"><div class="bc-week-lbl">W'+(i+1)+'</div><div class="bc-week-val '+cls+'">'+escH(r)+'</div></div>';
    });
    html+='</div><div style="margin-top:8px;font-size:12px;color:var(--text3)">통과 '+bc.passed+' / 경고 '+bc.warned+' / 드랍 '+bc.dropped+'</div></div>';
  }

  html+='<div class="sp-section"><div class="sp-sec-title">캠페인 이력 ('+c.campaignHistory.length+'건)</div>';
  if(c.campaignHistory.length>0){
    html+='<table class="mini-t"><thead><tr><th>날짜</th><th>캠페인</th><th>슬롯</th><th>피</th></tr></thead><tbody>';
    html+=c.campaignHistory.map(cl=>'<tr><td>'+fmtDate(cl.date)+'</td><td>'+escH(cl.campaign||'−')+'</td><td>'+cl.slot+'</td><td>'+fmtFee(cl.fee)+'</td></tr>').join('');
    html+='</tbody></table>';
  }else{html+='<div style="color:var(--text3);font-size:13px;padding:8px 0">이력 없음</div>'}
  html+='</div>';

  html+='<div class="sp-section"><div class="sp-sec-title">빠른 액션</div>';
  html+='<div class="sp-action-btns">';
  html+='<button class="sp-btn" onclick="showToast(\'계약서 발송 기능 준비 중\')">📄 계약서 발송</button>';
  html+='<button class="sp-btn" onclick="showToast(\'리마인드 메일 기능 준비 중\')">📧 리마인드 메일</button>';
  html+='</div></div>';

  document.getElementById('sp-body').innerHTML = html;
  document.getElementById('panel-backdrop').classList.add('open');
  document.getElementById('side-panel').classList.add('open');
}
function closePanel(){
  document.getElementById('panel-backdrop').classList.remove('open');
  document.getElementById('side-panel').classList.remove('open');
}

// ── TAB 3: Campaigns ─────────────────────────────────────────────────────
function buildCampaigns() {
  document.getElementById('camp-cards').innerHTML = CAMPAIGNS.map((c,i)=>
    '<div class="camp-card '+(c.isMock?'type-mock':'type-paid')+'" onclick="openCampModal('+i+')">' +
    '<div class="camp-card-name">'+escH(c.name)+'</div>' +
    '<span class="camp-type-badge '+(c.isMock?'ctb-mock':'ctb-paid')+'">'+(c.isMock?'Mock':'Paid')+'</span>' +
    '<div class="camp-stats">' +
      '<div class="cs-item"><div class="cs-val">'+c.creators+'</div><div class="cs-lbl">크리에이터</div></div>' +
      '<div class="cs-item"><div class="cs-val">'+c.slots+'</div><div class="cs-lbl">슬롯</div></div>' +
      '<div class="cs-item"><div class="cs-val">'+fmtFee(c.fee)+'</div><div class="cs-lbl">총 지급금액</div></div>' +
      '<div class="cs-item"><div class="cs-val">'+(c.fee&&c.slots?fmtFee(Math.round(c.fee/c.slots)):'−')+'</div><div class="cs-lbl">평균 단가</div></div>' +
    '</div>' +
    '<div class="camp-period">📅 '+(c.startDate||'−')+' ~ '+(c.endDate||'−')+'</div>' +
    '</div>'
  ).join('');
}

function openCampModal(i) {
  const c = CAMPAIGNS[i];
  document.getElementById('modal-title-text').textContent = c.name;

  // Build timeline from startDate
  const tlStartDate = c.startDate || '2026-04-07';
  const stages = buildTimelineStages(tlStartDate);
  const tlEnd  = stages[stages.length-1].to;
  const totalDays = Math.max(1, daysBetween(tlStartDate, tlEnd));
  const todayStr  = new Date().toISOString().slice(0,10);

  function pct(date) {
    const d = Math.max(0, daysBetween(tlStartDate, date));
    return Math.min(100, d/totalDays*100);
  }
  function widthPct(from, to) {
    const d = Math.max(0, daysBetween(from, to));
    return Math.min(100, d/totalDays*100);
  }

  let html = '';

  // Summary
  html += '<div class="modal-section"><div class="modal-sec-title">캠페인 요약</div>' +
    '<div class="summary-nums">' +
    '<div class="sn-item"><div class="sn-val">'+c.creators+'</div><div class="sn-lbl">참여 인원</div></div>' +
    '<div class="sn-item"><div class="sn-val">'+c.slots+'</div><div class="sn-lbl">총 슬롯</div></div>' +
    '<div class="sn-item"><div class="sn-val">'+fmtFee(c.fee)+'</div><div class="sn-lbl">총 지급금액</div></div>' +
    '<div class="sn-item"><div class="sn-val">'+(c.fee&&c.slots?fmtFee(Math.round(c.fee/c.slots)):'−')+'</div><div class="sn-lbl">평균 단가</div></div>' +
    '</div>' +
    '<div style="font-size:12px;color:var(--text3);margin-top:4px">가이드라인 링크: −</div>' +
    '</div>';

  // Timeline (Gantt)
  html += '<div class="modal-section"><div class="modal-sec-title">캠페인 타임라인</div>';
  html += '<div class="timeline-wrap"><div class="timeline-grid">';

  // Header row: date labels every ~5 days
  html += '<div class="tl-row" style="height:20px">';
  html += '<div class="tl-label" style="font-size:10px;color:var(--text3)">'+fmtDate(tlStartDate)+'</div>';
  html += '<div class="tl-track" style="position:relative">';
  // today marker
  if (todayStr >= tlStartDate && todayStr <= tlEnd) {
    const tp = pct(todayStr);
    html += '<div class="tl-today-line" style="left:'+tp+'%">' +
      '<div class="tl-today-label">오늘</div></div>';
  }
  html += '</div></div>';

  // Stage rows
  stages.forEach((s,idx)=>{
    const left  = pct(s.from);
    const width = s.days > 0 ? widthPct(s.from, s.to) : 1;
    html += '<div class="tl-row">';
    html += '<div class="tl-label">'+escH(s.name)+'</div>';
    html += '<div class="tl-track">';
    html += '<div class="tl-segment" style="' +
      'position:absolute;left:'+left+'%;width:'+Math.max(width,2)+'%;' +
      'background:'+s.color.bg+';color:'+s.color.text+'">' +
      (s.days>0?s.days+'일':'당일')+'</div>';
    html += '</div></div>';
  });

  // Legend
  html += '<div class="tl-legend">';
  stages.forEach(s=>{
    html += '<div class="tl-legend-item">' +
      '<div class="tl-legend-dot" style="background:'+s.color.bg+'"></div>' +
      escH(s.name)+'</div>';
  });
  html += '</div>';
  html += '</div></div></div>';

  // Participants table (if real campaign)
  if (c.entries && c.entries.length > 0) {
    const byCreator = {};
    c.entries.forEach(e=>{
      if(!byCreator[e.tiktokId]) byCreator[e.tiktokId]={dates:[],fee:0,slots:0};
      if(e.date) byCreator[e.tiktokId].dates.push(e.date);
      byCreator[e.tiktokId].fee   += e.fee||0;
      byCreator[e.tiktokId].slots += e.slot||0;
    });
    html += '<div class="modal-section"><div class="modal-sec-title">참여 크리에이터</div>';
    html += '<table class="mini-t"><thead><tr><th>TikTok ID</th><th>슬롯</th><th>Fee</th><th>제출일</th></tr></thead><tbody>';
    html += Object.entries(byCreator).map(([tid,v])=>
      '<tr><td>@'+escH(tid)+'</td><td>'+v.slots+'</td><td>'+fmtFee(v.fee)+'</td><td>'+v.dates.sort().join(', ')+'</td></tr>'
    ).join('');
    html += '</tbody></table></div>';
  }

  document.getElementById('modal-body').innerHTML = html;
  document.getElementById('modal-backdrop').classList.add('open');
}
function closeCampModal(){document.getElementById('modal-backdrop').classList.remove('open')}

// ── TAB 4: Weekly ─────────────────────────────────────────────────────────
const WEEKLY_WEEKS = ['3월 1주','3월 2주','3월 3주 (현재)'];
let currentWeek = 2;
const WEEKLY_SNAPSHOTS = [
  {Contacting:52,Onboarding:15,Quality:18,Bound:10,newBound:1,qaRate:72},
  {Contacting:50,Onboarding:17,Quality:19,Bound:11,newBound:1,qaRate:74},
  {Contacting:49,Onboarding:18,Quality:19,Bound:12,newBound:1,qaRate:76},
];

function buildWeekly() {
  document.getElementById('week-tabs').innerHTML = WEEKLY_WEEKS.map((w,i)=>
    '<div class="week-tab'+(i===currentWeek?' active':'')+'" onclick="selectWeek('+i+')">'+w+'</div>'
  ).join('');

  const snap=WEEKLY_SNAPSHOTS[currentWeek], prev=currentWeek>0?WEEKLY_SNAPSHOTS[currentWeek-1]:null;
  const snapStages=['Contacting','Onboarding','Quality','Bound'];
  const snapColors={'Contacting':'var(--contact)','Onboarding':'var(--onboard)','Quality':'var(--quality)','Bound':'var(--bound)'};

  document.getElementById('week-snapshot').innerHTML = [
    ...snapStages.map(s=>{
      const val=snap[s], delta=prev?val-prev[s]:null;
      const dstr=delta!==null?(delta>0?'<span class="delta-up">↑'+delta+'</span>':delta<0?'<span class="delta-dn">↓'+Math.abs(delta)+'</span>':'<span class="delta-neu">±0</span>'):'';
      return '<div class="snap-item"><div class="snap-stage" style="color:'+snapColors[s]+'">'+s+'</div><div class="snap-val">'+val+'</div><div class="snap-delta">'+dstr+'</div></div>';
    }),
    '<div class="snap-item"><div class="snap-stage" style="color:var(--green)">신규 Bound</div><div class="snap-val">'+snap.newBound+'</div><div class="snap-delta">'+(prev?'<span class="delta-up">↑'+(snap.newBound-prev.newBound)+'</span>':'')+'</div></div>',
    '<div class="snap-item"><div class="snap-stage" style="color:var(--quality)">QA 통과율</div><div class="snap-val">'+snap.qaRate+'%</div><div class="snap-delta">'+(prev?'<span class="delta-up">↑'+(snap.qaRate-prev.qaRate)+'%</span>':'')+'</div></div>',
  ].join('');

  // SVG line chart
  const W=480,H=130,PAD=32;
  const metrics=[{key:'Bound',color:'#34d399'},{key:'Quality',color:'#a78bfa'},{key:'Contacting',color:'#64748b'}];
  const xStep=(W-PAD*2)/(WEEKLY_SNAPSHOTS.length-1);
  const maxVal=60;
  function tx(i){return PAD+i*xStep}
  function ty(v){return PAD+(H-PAD*2)*(1-v/maxVal)}
  let svg='<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:'+H+'px">';
  [0,20,40,60].forEach(v=>{
    svg+='<line x1="'+PAD+'" y1="'+ty(v)+'" x2="'+(W-PAD)+'" y2="'+ty(v)+'" stroke="#1e293b" stroke-width="1"/>';
    svg+='<text x="'+(PAD-4)+'" y="'+(ty(v)+4)+'" fill="#475569" font-size="9" text-anchor="end">'+v+'</text>';
  });
  WEEKLY_WEEKS.forEach((w,i)=>{
    svg+='<text x="'+tx(i)+'" y="'+(H-4)+'" fill="#475569" font-size="9" text-anchor="middle">'+w.replace(' (현재)','')+'</text>';
  });
  metrics.forEach((m,mi)=>{
    const pts=WEEKLY_SNAPSHOTS.map((s,i)=>tx(i)+','+ty(s[m.key])).join(' ');
    svg+='<polyline points="'+pts+'" fill="none" stroke="'+m.color+'" stroke-width="2" stroke-linejoin="round"/>';
    WEEKLY_SNAPSHOTS.forEach((s,i)=>{svg+='<circle cx="'+tx(i)+'" cy="'+ty(s[m.key])+'" r="3" fill="'+m.color+'"/>'});
    svg+='<rect x="'+(W-70)+'" y="'+(10+mi*14)+'" width="8" height="8" fill="'+m.color+'" rx="2"/>';
    svg+='<text x="'+(W-58)+'" y="'+(18+mi*14)+'" fill="'+m.color+'" font-size="9">'+m.key+'</text>';
  });
  svg+='</svg>';
  document.getElementById('line-chart').innerHTML = svg;

  document.getElementById('weekly-table').innerHTML =
    '<table class="weekly-t"><thead><tr><th>주차</th><th>Contact</th><th>Onboarding</th><th>Quality</th><th>Bound</th><th>신규Bound</th><th>QA통과율</th></tr></thead><tbody>'+
    WEEKLY_WEEKS.map((w,i)=>{const s=WEEKLY_SNAPSHOTS[i];return '<tr class="'+(i===currentWeek?'current-week':'')+'">' +
      '<td>'+w+'</td><td>'+s.Contacting+'</td><td>'+s.Onboarding+'</td><td>'+s.Quality+'</td><td>'+s.Bound+'</td><td>'+s.newBound+'</td><td>'+s.qaRate+'%</td></tr>'}).join('')+
    '</tbody></table>';
}
function selectWeek(i){currentWeek=i;buildWeekly()}

// ── Tab nav ───────────────────────────────────────────────────────────────
const TAB_PAGES=['dashboard','influencer','campaigns','weekly'];
function switchTab(name){
  document.querySelectorAll('.nav-tab').forEach((t,i)=>t.classList.toggle('active',TAB_PAGES[i]===name));
  document.querySelectorAll('.tab-page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
}
function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;
  t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);
}

// ── Live Data Fetch (Google Sheets gviz CSV) ──────────────────────────────
const SHEET_ID = '1Wxvi-VJ6EQTynNgZvzHpCXPjdn-wfgM7tAUw6ey099g';
function gvizUrl(sheetName) {
  return 'https://docs.google.com/spreadsheets/d/' + SHEET_ID +
    '/gviz/tq?tqx=out:csv&sheet=' + encodeURIComponent(sheetName);
}

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = csvRow(lines[0]);
  return lines.slice(1).map(l => {
    const vals = csvRow(l);
    const obj = {};
    headers.forEach((h, i) => obj[h] = vals[i] || '');
    return obj;
  });
}
function csvRow(line) {
  const res = []; let cur = ''; let inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') { inQ = !inQ; continue; }
    if (c === ',' && !inQ) { res.push(cur.trim()); cur = ''; continue; }
    cur += c;
  }
  res.push(cur.trim());
  return res;
}

async function fetchSheet(name) {
  const res = await fetch(gvizUrl(name));
  if (!res.ok) throw new Error(name + ' 시트 로드 실패');
  return parseCSV(await res.text());
}

async function fetchLiveData() {
  const btn = document.getElementById('refresh-btn');
  const timeEl = document.getElementById('update-time');
  btn.classList.add('loading');
  try {
    // 병렬로 모든 시트 fetch
    const [dbRows, logRows, bcRows, stageRows] = await Promise.all([
      fetchSheet('Heroines_DB'),
      fetchSheet('Campaign_Log'),
      fetchSheet('BC_Score'),
      fetchSheet('Settings_Stages'),
    ]);

    // ── Heroines_DB 파싱 ──
    const newCreators = dbRows.slice(1).map(r => { // 3행부터 (헤더2행 제외)
      // 열 인덱스: col1=tiktokId, col2=name, col15=nextAction, col19=slotNum ...
      const keys = Object.keys(r);
      return {
        tiktokId:     r[keys[1]] || '',
        name:         r[keys[2]] || '',
        nextAction:   r[keys[15]] || '',
        slotNum:      parseInt(r[keys[19]]) || 0,
        slotBA:       r[keys[21]] === 'TRUE',
        slotMakeup:   r[keys[22]] === 'TRUE',
        usedSlot:     parseInt(r[keys[23]]) || 0,
        leftSlot:     parseInt(r[keys[24]]) || 0,
        stage:        r[keys[26]] || '',
        stageStart:   r[keys[27]] || '',
        expectedBind: r[keys[28]] || '',
        expectedWeek: r[keys[29]] || '',
      };
    }).filter(c => c.stage);

    // ── Campaign_Log 파싱 ──
    const newLog = logRows.map(r => {
      const keys = Object.keys(r);
      const slot = parseInt(r[keys[3]]);
      if (isNaN(slot)) return null;
      return {
        date:     r[keys[0]] || '',
        tiktokId: r[keys[1]] || '',
        type:     r[keys[2]] || '',
        slot,
        fee:      parseInt(r[keys[4]]) || 0,
        campaign: r[keys[5]] || '',
      };
    }).filter(Boolean);

    // ── BC_Score 파싱 ──
    const newBC = {};
    bcRows.forEach(r => {
      const keys = Object.keys(r);
      const account = r[keys[1]]; if (!account) return;
      const batch   = r[keys[0]]; if (!batch) return;
      const wRes = [r[keys[6]], r[keys[10]], r[keys[14]], r[keys[18]]];
      const last = [...wRes].reverse().find(v => v) || '미참여';
      if (!newBC[account] || batch > newBC[account].batch) {
        newBC[account] = {
          batch, latestResult: last,
          allResults: wRes.filter(v => v),
          passed:  wRes.filter(v=>v==='통과').length,
          dropped: wRes.filter(v=>v==='드랍').length,
          warned:  wRes.filter(v=>v==='경고').length,
        };
      }
    });

    // ── Settings_Stages 파싱 ──
    const newStage = {};
    stageRows.forEach(r => {
      const keys = Object.keys(r);
      const s = r[keys[0]]; if (!s) return;
      newStage[s] = parseInt(r[keys[2]]) || 0;
    });

    // ── 전역 데이터 교체 ──
    if (newCreators.length) {
      RAW_CREATORS.length = 0;
      newCreators.forEach(c => RAW_CREATORS.push(c));
    }
    if (newLog.length) {
      CAMPAIGN_LOG.length = 0;
      newLog.forEach(c => CAMPAIGN_LOG.push(c));
      Object.keys(USED_BY_ID).forEach(k => delete USED_BY_ID[k]);
      CAMPAIGN_LOG.forEach(cl => {
        if (cl.tiktokId) USED_BY_ID[cl.tiktokId] = (USED_BY_ID[cl.tiktokId]||0) + (cl.slot||0);
      });
    }
    if (Object.keys(newBC).length) {
      Object.keys(BC_SCORE_RAW).forEach(k => delete BC_SCORE_RAW[k]);
      Object.assign(BC_SCORE_RAW, newBC);
    }
    if (Object.keys(newStage).length) {
      Object.keys(STAGE_LEAD).forEach(k => delete STAGE_LEAD[k]);
      Object.assign(STAGE_LEAD, newStage);
    }

    buildDashboard(); buildInfluencer(); buildCampaigns(); buildWeekly();

    const fmt = new Date().toLocaleString('ko-KR', {month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});
    timeEl.textContent = '업데이트 ' + fmt;
    showToast('최신 데이터로 업데이트됐어요 ✓');
  } catch (err) {
    showToast('로드 실패: ' + err.message);
    console.error(err);
  } finally {
    btn.classList.remove('loading');
  }
}

// ── Init ──────────────────────────────────────────────────────────────────
buildDashboard(); buildInfluencer(); buildCampaigns(); buildWeekly();

</script>
